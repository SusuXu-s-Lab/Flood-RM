# Marshfield coastal SFINCS configuration.

paths:
  data_root: locations/marshfield/data

static_sources:
  bbox:
    output: data/static/aoi/bbox.geojson

# Coastal protective structures specific to Marshfield (MassGIS 2015 public layers).
sfincs_structures:
  enabled: true
  source_root: data/static/structures/sources
  output_root: data/static/structures/processed
  figures_root: data/sfincs/figures/structures
  layers:
  - name: weirs
    component: weirs
    source: weirs_marshfield_massgis_public_2015.geojson
    dz: null
  - name: thin_dams
    component: thin_dams
    source: thin_dams_marshfield_massgis_public_2015.geojson

coastal_wave_coupling:
  hydrology:
    infiltration:
      enabled: true
      method: cn_with_recovery
      lulc: worldcover
      hsg: data/static/soils/hsg_mfield.tif                          # per-location SSURGO hydrologic soil group
      ksat: data/static/soils/ksat_mmhr_mfield.tif                   # per-location saturated conductivity
      ksat_effective: data/static/soils/ksat_mmhr_mfield_effective.tif
      ksat_scale_factor: 0.1
      ksat_max_mmhr: 75.0
      effective: 0.5
      effective_source: scalar_until_nwm_soilsat_top_rerun
      reclass_table: null
      factor_ksat: 0.2777777777777778
      block_size: 2000
  runup_gauges:                       # site-specific overtopping transects (model-CRS coords)
    crs: EPSG:26919
    rugdepth: 0.05
    transects:
    - name: rg_green_harbor_weir
      x0: 363600.0
      y0: 4660350.0
      x1: 364150.0
      y1: 4660350.0
    - name: rg_brant_rock_thin_dam
      x0: 363900.0
      y0: 4661150.0
      x1: 364450.0
      y1: 4661450.0
