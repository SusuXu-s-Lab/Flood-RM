# SnapWave model settings and wave-coupled roots.
coastal_wave_coupling:
  quadtree:
    base_model_root: data/sfincs/base_quadtree_snapwave
    res: 60
    rotated: true
    nr_subgrid_pixels: 6
    waterlevel_boundary_buffer_m: 180
  snapwave:
    boundary_min_dist: 1500
    boundary_seaward_dist: 5000
    directional_spread_degrees: 20.0

# SnapWave runup-gauge output transects.
  runup_gauges:
    crs: EPSG:26919
    rugdepth: 0.05
    transects:
      - name: rg_green_harbor_weir
        x0: 363600.0
        y0: 4660350.0
        x1: 364150.0
        y1: 4660350.0
      - name: rg_brant_rock_thin_dam
        x0: 363900.0
        y0: 4661150.0
        x1: 364450.0
        y1: 4661450.0

# Native HydroMT-SFINCS/SnapWave recipes extracted by the loader.
hydromt:
  build:
    setup_grid_from_region:
      quadtree: true
    setup_mask_bounds:
      buffer: 180
    setup_snapwave:
      boundary_min_dist: 1500
      boundary_seaward_dist: 5000
      directional_spread_degrees: 20.0
    setup_runup_gauges:
      rugdepth: 0.05
      transects:
        - name: rg_green_harbor_weir
          x0: 363600.0
          y0: 4660350.0
          x1: 364150.0
          y1: 4660350.0
        - name: rg_brant_rock_thin_dam
          x0: 363900.0
          y0: 4661150.0
          x1: 364450.0
          y1: 4661450.0
  update_forcing:
    setup_wave_forcing:
      geodataset: era5_waves
