setup_grid_from_region:
  res: 30
  crs: EPSG:26919
  rotated: true

setup_dep:
  datasets_dep:
    - elevtn: cudem_elv

setup_mask_active:
  zmin: -0.1
  drop_area: 100

setup_mask_bounds:
  btype: waterlevel
  zmax: 2

setup_subgrid:
  datasets_dep:
    - elevtn: cudem_elv
  datasets_rgh:
    - lulc: worldcover
  write_dep_tif: true
  nr_subgrid_pixels: 6
