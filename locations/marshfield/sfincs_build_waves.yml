setup_grid_from_region:
  res: 60
  crs: EPSG:26919
  rotated: true
  quadtree: true

setup_dep:
  datasets_dep:
    - elevtn: cudem_elv

setup_mask_active:
  zmin: -0.1
  drop_area: 100

setup_mask_bounds:
  btype: waterlevel
  zmax: 2
  buffer: 180

setup_snapwave:
  boundary_min_dist: 1500
  boundary_seaward_dist: 5000
  directional_spread_degrees: 20.0

setup_subgrid:
  datasets_dep:
    - elevtn: cudem_elv
  datasets_rgh:
    - lulc: worldcover
  write_dep_tif: true
  nr_subgrid_pixels: 6

setup_runup_gauges:
  rugdepth: 0.05
  transects:
    - name: rg_green_harbor_weir
      x0: 363600.0
      y0: 4660350.0
      x1: 364150.0
      y1: 4660350.0
    - name: rg_brant_rock_thin_dam
      x0: 363900.0
      y0: 4661150.0
      x1: 364450.0
      y1: 4661450.0
