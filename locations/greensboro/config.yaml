project:
  name: greensboro
  place_name: Greensboro, NC, USA
  country: US
  model_crs: EPSG:32617
  reference_crs: EPSG:4326

flood_setting: inland

event_drivers:
- rainfall
- streamflow
- soil_moisture

coastal_waves: false

includes:
  grid: grid.yaml
  sfincs: domain.yaml
  sfincs_build: sfincs_build.yml
  sfincs_update_forcing: sfincs_update_forcing.yml
  wflow_build: wflow_build.yml
  wflow_update_forcing: wflow_update_forcing.yml

static_sources:
  ssurgo:
    hsg_output: data/static/soils/hsg_greensboro.tif
    ksat_output: data/static/soils/ksat_mmhr_greensboro.tif

collection:
  stream_geo_nldi:
    stream_geo_table: data/sources/national_hydrography/stream_geo.parquet
    raw_dir: data/sources/national_hydrography/stream_geo_raw
    nldi_lookup_cache: data/sources/national_hydrography/nldi_stream_geo_comid_cache.csv
  national_hydrography:
    stream_geo_table: data/sources/national_hydrography/stream_geo.parquet
    nldi_lookup_cache: data/sources/national_hydrography/nldi_stream_geo_comid_cache.csv
    nhdplus_v2_flowlines: data/sources/national_hydrography/nhdplus_v2_flowlines.gpkg
    stream_geo_join_method: attribute_transfer
    stream_geo_join_max_distance_m: 2500
    use_nldi_stream_geo_join: false
    nldi_request_timeout_seconds: 10
    nldi_max_workers: 4
    nldi_progress_interval: 250
  aorc_sst:
    transposition_region:
      id: greensboro-inland-review-required
      geometry_file: data/sources/aorc_sst/transposition_regions/transposition_region.geojson
    event_meteo:
      enabled: true
      source_variables:
        temp: TMP_2maboveground
        press_msl: PRES_surface
        kin: DSWRF_surface
  nwm:
    streamflow:
      reason: Greensboro production streamflow frequency should use HUC-selected active USGS streamgage records.

wflow:
  event_forcing:
    temp_pet:
      event_temp_pet: data/wflow/events/<event_id>/temp_pet.nc
      pet_method: makkink
      pressure_source: AORC surface pressure exposed as HydroMT press_msl; pressure correction disabled.

event_catalog:
  dependence:
    driver_records:
      rainfall:
        path: data/sources/aorc_sst/greensboro/72hr-events/storm-stats.csv
