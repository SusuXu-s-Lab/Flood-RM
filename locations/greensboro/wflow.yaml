# Greensboro Wflow collection overrides.
collection:
  aorc_sst:
    transposition_region:
      id: greensboro-inland-review-required
      geometry_file: data/sources/aorc_sst/transposition_regions/transposition_region.geojson

# Wflow domain selection.
wflow:
  domain_set:
    review_required: false

# Native HydroMT-Wflow recipe deltas.
hydromt:
  build:
    inherits: default_wflow_sbm
    steps:
      - setup_basemaps:
          region:
            bbox: [-80.02131, 35.98846, -79.48951, 36.31469]
      - setup_gauges:
          gauges_fn: greensboro_streamgage_network

  update_forcing:
    inherits: default_wflow_sbm
