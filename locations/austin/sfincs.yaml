# HydroMT-SFINCS primary model recipe.
hydromt:
  build:
    setup_grid_from_region:
      res: 60
      crs: EPSG:32614
      rotated: true
    setup_dep:
      datasets_dep:
        - elevtn: dem_region
    setup_mask_active:
      zmin: -0.1
      drop_area: 100
    setup_mask_bounds:
      btype: outflow
      zmax: 2
    setup_subgrid:
      datasets_dep:
        - elevtn: dem_region
      datasets_rgh:
        - lulc: landcover_region
      write_dep_tif: true
      nr_subgrid_pixels: 6

  update_forcing:
    setup_config:
      tref: 20000101 000000
      tstart: 20000101 000000
      tstop: 20000104 000000
      dtout: 3600
    setup_precip_forcing:
      precip_fn: event_precip
    setup_discharge_forcing:
      timeseries: wflow_discharge
    write_forcing:
    write_config:

# SFINCS model settings and domain selection.
sfincs:
  grid_resolution_m: 60
  build_config: data/sfincs/config/sfincs_build.yml
  update_forcing_config: data/sfincs/config/sfincs_update_forcing.yml

sfincs_domain_set:
  allow_multiple_domains: true
  include_domain_ids:
    - austin_p5u

# Wflow-coupled SFINCS forcing and parameters.
inland_coupling:
  discharge_forcing:
    source: wflow_dynamic
    handoff_location: sfincs_native_river_inflow
    river_upa_km2: 10.0
    river_len_m: 500.0
    river_inflow_buffer_m: 200.0
  amplification:
    enabled: true
    primary_reference_gage: "08155400"
    k_band: [0.5, 2.0]
  baseflow:
    enabled: true
    reference_gage: "08155400"
    reference_statistic: median
    min_baseflow_fraction: 0.25
  initial_conditions:
    enabled: true
    method: hydrograph_mean_channel_inifile
    source: wflow_dynamic_hydrographs
    statistic: initial_window_source_mean
    mean_window_hours: 1.0
    reference_discharge_m3s: 5000.0
    reference_depth_m: 1.5
    min_depth_m: 0.1
    max_depth_m: 2.5
    river_buffer_cells: 2.0
    fill_value: -9999.0
    note: HydroMT-SFINCS writes sfincs.ini via initial_conditions.create; outside the river corridor SFINCS initializes at bed level.
  infiltration:
    enabled: true
    method: cn_with_recovery
    lulc: data/static/processed/landcover_region_setup.tif
    hsg: data/static/soils/hsg_austin.tif
    ksat: data/static/soils/ksat_mmhr_austin.tif
    ksat_effective: data/static/soils/ksat_mmhr_austin_effective.tif
    effective: 0.5
    effective_source: scalar_until_event_nwm_soilsat_top_update
    review_required: true

# SFINCS dataset paths.
event_catalog:
  dependence:
    driver_records:
      streamflow:
        path: data/sources/usgs_streamgages/streamflow_records.csv
        time_column: time
        value_column: discharge_cfs
        aggregate: max
      rainfall:
        path: data/sources/aorc_sst/austin/72hr-events/storm-stats.csv
        time_column: storm_date
        value_column: mean
    driver_vector:
      - streamflow
      - rainfall
    cooccurrence:
      condition_on:
        - streamflow

static_sources:
  ssurgo:
    hsg_output: data/static/soils/hsg_austin.tif
    ksat_output: data/static/soils/ksat_mmhr_austin.tif

paths:
  data_root: locations/austin/data
