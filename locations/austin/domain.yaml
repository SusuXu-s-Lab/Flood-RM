# Austin inland domain configuration.
# Austin's austin_p5u primary inflow is the Highland Lakes-regulated 
# Colorado mainstem (10,565 km²) with no on-reach gage. 
# Implemented rainfall-driven, with Barton Creek as a scale-appropriate Wflow-readiness
# anchor for the rainfall-runoff response), but the regulated mainstem flow is governed 
#by reservoir operations, not rainfall-runoff 

paths:
  data_root: locations/austin/data

sfincs:
  grid_resolution_m: 60

sfincs_domain_set:
  include_domain_ids:              # SMART-DS evaluation component(s) to model
    - austin_p5u                   # smaller Austin pilot domain with lighter Wflow/SFINCS footprint

wflow:
  dynamic_handoff:
    state_policy: shared_baseline
    baseline_id: baseline_90d
    baseline_reference_time: "2020-11-14T00:00:00"
    baseline_root: data/wflow/warmup/baseline_90d
    warmup_days: 90
  domain_set:
    outlet_source: encompassing_huc
    allow_multiple_submodels: true
    event_catalog_scope: shared_across_domain_set
    subbasin_fabric: data/wflow/domain_set_subbasins.gpkg
    subbasin_fabric_diagnostics: data/wflow/readiness/nhdplus_subbasin_fabric.csv
    crossings:
      min_uparea_km2: 10.0
    review_required: true

inland_coupling:
  discharge_forcing:
    source: wflow_dynamic
    handoff_location: sfincs_native_river_inflow
    river_upa_km2: 10.0
    river_len_m: 500.0
    river_inflow_buffer_m: 200.0
  amplification:                     # ADR-0016 Same-Frequency Amplification (single-K on Wflow output)
    enabled: true
    primary_reference_gage: "08155400"   # Barton Creek: scale-appropriate Wflow-readiness anchor (324 km2, long record) for the rainfall-runoff response
    # NOTE: the dominant austin_p5u inflow is the Highland Lakes-regulated Colorado mainstem
    # (austin_p5u_inflow_01 ~10,565 km2) with NO on-reach reviewed gage. That regulated mainstem
    # warrants reservoir-aware / Option-B (gage-as-boundary) handling per ADR-0016 'Consequences';
    # Barton Creek validates the rainfall-runoff component only, not the regulated mainstem.
    k_band: [0.5, 2.0]
  baseflow:                          # ADR-0016 Wflow Readiness: warm-state spin-up must leave non-dry channels
    enabled: true
    reference_gage: "08155400"
    reference_statistic: median
    min_baseflow_fraction: 0.25
  initial_conditions:
    enabled: true
    method: hydrograph_mean_channel_inifile
    source: wflow_dynamic_hydrographs
    statistic: initial_window_source_mean
    mean_window_hours: 1.0
    reference_discharge_m3s: 5000.0
    reference_depth_m: 1.5
    min_depth_m: 0.1
    max_depth_m: 2.5
    river_buffer_cells: 2.0
    fill_value: -9999.0
    note: "HydroMT-SFINCS writes sfincs.ini via initial_conditions.create; outside the river corridor SFINCS initializes at bed level."
  infiltration:
    enabled: true
    method: cn_with_recovery
    lulc: data/static/processed/landcover_region_setup.tif
    hsg: data/static/soils/hsg_austin.tif                          # per-location SSURGO hydrologic soil group
    ksat: data/static/soils/ksat_mmhr_austin.tif                   # per-location saturated conductivity
    ksat_effective: data/static/soils/ksat_mmhr_austin_effective.tif
    ksat_scale_factor: 0.1
    ksat_max_mmhr: 75.0
    effective: 0.5
    effective_source: scalar_until_event_nwm_soilsat_top_update
    reclass_table: null
    factor_ksat: 0.2777777777777778
    block_size: 2000
    review_required: true
