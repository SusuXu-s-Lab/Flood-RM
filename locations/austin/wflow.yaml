# Austin Wflow collection overrides.
collection:
  usgs_streamgages:
    reviewed_network: data/sources/usgs_streamgages/streamgage_network.geojson
    streamflow_records: data/sources/usgs_streamgages/streamflow_records.csv
    discovery:
      search_geometry: data/static/aoi/wflow_nhdplus_watersheds.geojson

  lcra_hydromet:
    output: data/sources/lcra_hydromet/flow_sites.geojson
    current_output: data/sources/lcra_hydromet/flow_sites_current.csv
    search_geometry: data/static/aoi/wflow_nhdplus_watersheds.geojson
    exclude_agencies:
      - USGS
    distinct_from_usgs_network: data/sources/usgs_streamgages/streamgage_network.geojson
    distinct_distance_m: 150
    status: supplemental_current_flow_discovery

  national_hydrography:
    collect_review_vectors: true
    basemap_source_resolution_degrees: 0.000925925925925926
    river_geometry: data/sources/national_hydrography/nhdplus_hr_river_geometry.gpkg
    catchments: data/sources/national_hydrography/nhdplus_hr_catchments.gpkg
    reservoirs:
      enabled: true
      output: data/sources/national_hydrography/nhdplus_hr_wflow_reservoirs.gpkg
      source_layer: USGS NHDPlus HR NHDWaterbody
      operation: no_control
      min_area_km2: 1.0
      default_depth_m: 5.0
      default_discharge_m3s: 0.01
      conditions:
        enabled: true
        provider: twdb_water_data_for_texas
        provider_label: TWDB Water Data for Texas
        base_url: https://waterdatafortexas.org/reservoirs/individual
        period_suffix: -1year
        statistic: median
        cache_dir: data/sources/twdb_reservoirs
        summary_csv: data/sources/twdb_reservoirs/reservoir_condition_summary.csv
        provenance_json: data/sources/twdb_reservoirs/reservoir_condition_provenance.json
        request_timeout_seconds: 60
        min_depth_m: 0.25
        max_depth_m: 200.0
        reservoir_slugs:
          Lake Travis: travis
          Lake Austin: austin
          Lake Lyndon B Johnson: lyndon-b-johnson
          Lake Marble Falls: marble-falls

  aorc_sst:
    transposition_region:
      id: austin-inland-review-required
      geometry_file: data/sources/aorc_sst/transposition_regions/transposition_region.geojson
    # A 6 h transposition scan stride keeps the per-year SST search cheaper while
    # still collecting 72 h storm windows and 72 h declustering via collector defaults.
    check_every_n_hours: 6
    min_precip_threshold: 40.0
    defer_event_windows: true

# Wflow domain selection.
wflow:
  build_config: data/wflow/config/wflow_build.yml
  update_forcing_config: data/wflow/config/wflow_update_forcing.yml
  run:
    command: wflow_cli {run_config}
  streamgage_network:
    reviewed_network: data/sources/usgs_streamgages/streamgage_network.geojson
  dynamic_handoff:
    state_policy: shared_baseline
    baseline_id: baseline_90d
    baseline_reference_time: "2020-11-14T00:00:00"
    baseline_root: data/wflow/warmup/baseline_90d
    warmup_days: 90
  domain_set:
    outlet_source: boundary_handoff_watershed
    allow_multiple_submodels: true
    review_required: true
    huc:
      root: data/wflow/domain_huc
      output: data/wflow/wflow_domain_huc.geojson
    crossings:
      min_uparea_km2: 10

# Native HydroMT-Wflow recipe deltas.
hydromt:
  build:
    steps:
      - setup_config:
          data:
            time.starttime: "2000-01-01T00:00:00"
            time.endtime: "2000-01-02T00:00:00"
            time.timestepsecs: 3600
            input.path_static: staticmaps.nc
            input.path_forcing: inmaps.nc
            output.csv.path: output.csv
            output.csv.header:
              - river_q
              - precip
            output.csv.params:
              - river_water__volume_flow_rate
              - atmosphere_water__precipitation_volume_flux
      - setup_basemaps:
          hydrography_fn: us_hydrography_basemap
          basin_index_fn: null
          region:
            bbox: [-98.19382, 30.01264, -97.36073, 30.64317]
          res: 0.0009
          upscale_method: ihu
      - setup_rivers:
          hydrography_fn: us_hydrography_basemap
          river_geom_fn: nhdplus_hr_river_geometry
          river_upa: 10
          rivdph_method: powlaw
          min_rivwth: 30
          slope_len: 2000
          smooth_len: 5000
      - setup_reservoirs_no_control:
          reservoirs_fn: nhdplus_hr_wflow_reservoirs
          min_area: 1.0
          duplicate_id: skip
      - setup_lulcmaps:
          lulc_fn: esa_worldcover
      - setup_soilmaps:
          soil_fn: ssurgo_wflow_soil_parameters
          ptf_ksatver: brakensiek
      - setup_constant_pars:
          subsurface_water__horizontal_to_vertical_saturated_hydraulic_conductivity_ratio: 100
          soil_water_saturated_zone_bottom__max_leakage_volume_flux: 0
      - setup_gauges:
          index_col: site_no
          snap_to_river: true
          snap_uparea: true
          max_dist: 10000
          toml_output: csv
          gauge_toml_header:
            - river_q
            - precip
          gauge_toml_param:
            - river_water__volume_flow_rate
            - atmosphere_water__precipitation_volume_flux
          gauges_fn: austin_streamgage_network

  update_forcing:
    steps:
      - setup_config:
          data:
            time.starttime: "2000-01-01T00:00:00"
            time.endtime: "2000-01-04T00:00:00"
            time.timestepsecs: 3600
            input.path_forcing: inmaps-event.nc
            dir_output: run_event
      - setup_precip_forcing:
          precip_fn: event_precip
      - setup_temp_pet_forcing:
          temp_pet_fn: event_temp_pet
          press_correction: false
          temp_correction: true
          pet_method: makkink
