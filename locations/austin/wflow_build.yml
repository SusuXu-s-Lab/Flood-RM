steps:
  - setup_config:
      data:
        time.starttime: "2000-01-01T00:00:00"
        time.endtime: "2000-01-02T00:00:00"
        time.timestepsecs: 3600
        input.path_static: staticmaps.nc
        input.path_forcing: inmaps.nc
        output.csv.path: output.csv
        output.csv.header: [river_q, precip]
        output.csv.params:
          - river_water__volume_flow_rate
          - atmosphere_water__precipitation_volume_flux

  - setup_basemaps:
      region:
        bbox: [-98.19382, 30.01264, -97.36073, 30.64317]
      hydrography_fn: us_hydrography_basemap
      basin_index_fn: null
      res: 0.0009
      upscale_method: ihu

  - setup_rivers:
      hydrography_fn: us_hydrography_basemap
      river_geom_fn: nhdplus_hr_river_geometry
      river_upa: 10
      rivdph_method: powlaw
      min_rivwth: 30
      slope_len: 2000
      smooth_len: 5000

  - setup_lulcmaps:
      lulc_fn: esa_worldcover

  - setup_soilmaps:
      soil_fn: ssurgo_wflow_soil_parameters
      ptf_ksatver: brakensiek

  - setup_constant_pars:
      subsurface_water__horizontal_to_vertical_saturated_hydraulic_conductivity_ratio: 100
      soil_water_saturated_zone_bottom__max_leakage_volume_flux: 0

  - setup_gauges:
      gauges_fn: austin_streamgage_network
      index_col: site_no
      snap_to_river: true
      snap_uparea: true
      max_dist: 10000
      toml_output: csv
      gauge_toml_header:
        - river_q
        - precip
      gauge_toml_param:
        - river_water__volume_flow_rate
        - atmosphere_water__precipitation_volume_flux
